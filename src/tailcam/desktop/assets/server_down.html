<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TailCam — service not running</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    background: #0b0d16; color: #e8eaf2;
  }
  @media (prefers-color-scheme: light) { body { background: #f5f6fa; color: #1a1c26; } }
  .card { max-width: 30rem; padding: 2.5rem; text-align: center; }
  h1 { font-size: 1.35rem; margin: 0 0 0.75rem; }
  p { line-height: 1.6; opacity: 0.85; margin: 0.5rem 0; }
  code { background: rgba(127,127,127,0.18); padding: 0.15em 0.45em; border-radius: 6px; }
  .dot { font-size: 2.4rem; display: block; margin-bottom: 1rem; }
</style>
</head>
<body>
  <div class="card">
    <span class="dot">📷</span>
    <h1>The TailCam service isn't running</h1>
    <p>Open the <b>TailCam menu-bar icon</b> and choose <b>Start Service</b>
       (or <b>Install &amp; Start Service</b> on a fresh machine).</p>
    <p>From a terminal: <code>tailcam start</code> &nbsp;·&nbsp; diagnose with <code>tailcam doctor</code></p>
    <p>Once it's up, choose <b>Open Dashboard</b> again.</p>
  </div>
</body>
</html>
