name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
  workflow_dispatch:

jobs:
  python-web:
    name: Python and Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test Python
        run: pytest -q

      - name: Lint Python
        run: ruff check .

      - name: Typecheck Python
        run: mypy src

      - name: Install web dependencies
        working-directory: web-ui
        run: npm ci

      - name: Typecheck web
        working-directory: web-ui
        run: npm run typecheck

      - name: Build web
        working-directory: web-ui
        run: npm run build

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Python desktop dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,desktop]"

      - name: Install web dependencies
        working-directory: web-ui
        run: npm ci

      - name: Check Rust desktop shell
        run: |
          if [ -f desktop/src-tauri/Cargo.toml ]; then
            cargo fmt --check --manifest-path desktop/src-tauri/Cargo.toml
            cargo test --manifest-path desktop/src-tauri/Cargo.toml
            cargo clippy --manifest-path desktop/src-tauri/Cargo.toml -- -D warnings
            cargo check --manifest-path desktop/src-tauri/Cargo.toml
          else
            echo "desktop/src-tauri/Cargo.toml not present yet; skipping Rust desktop checks"
          fi

      - name: Build and smoke-test sidecar
        run: |
          if [ -f desktop/scripts/build-sidecar.py ] && [ -f desktop/scripts/smoke-sidecar.py ]; then
            python desktop/scripts/build-sidecar.py
            python desktop/scripts/smoke-sidecar.py
          else
            echo "sidecar scripts not present yet; skipping sidecar smoke checks"
          fi

  desktop-windows:
    name: Desktop Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check Rust desktop shell
        shell: bash
        run: |
          if [ -f desktop/src-tauri/Cargo.toml ]; then
            cargo fmt --check --manifest-path desktop/src-tauri/Cargo.toml
            cargo test --manifest-path desktop/src-tauri/Cargo.toml
            cargo clippy --manifest-path desktop/src-tauri/Cargo.toml -- -D warnings
            cargo check --manifest-path desktop/src-tauri/Cargo.toml
          else
            echo "desktop/src-tauri/Cargo.toml not present yet; skipping Rust desktop checks"
          fi
